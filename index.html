<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindToTask Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/mainStyle.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="icon active">⌂</div>
      <div class="icon">☰</div>
      <div class="icon">▣</div>
      <div class="icon">☷</div>
      <div class="icon">⚙</div>
      <div class="spacer"></div>
      <div class="icon">?</div>
    </aside>
    <main class="main">
      <div class="top">
        <div class="left-top">
          <h1>Mercredi 8 avril 2026</h1>
          <button class="btn primary">
            <img src="./images/IconeNewTask.webp" alt="Nouveau">
          </button>
          <button class="btn"><img src="./images/IconeNewFromTemplate.webp" alt="Modèle"></button>
        </div>
        <div class="right-top"><button class="btn">🔔</button></div>
      </div>

      <!-- =============================
          BARRE FILTRE + RECHERCHE
      ============================= -->
      <div class="task-toolbar-search">
        
        <!-- Bloc filtre -->
        <div class="task-toolbar-filter-group">
          <label class="task-toolbar-filter-label" for="taskSortSelect">
            Trie :
          </label>

          <select class="task-toolbar-filter-select" id="taskSortSelect">
            <option value="status">Statut</option>
            <option value="priority">Priorité</option>
            <option value="category">Catégorie</option>
          </select>
        </div>

        <!-- Bloc recherche -->
        <input
          type="text"
          class="task-toolbar-search-input"
          placeholder="Rechercher..."
          id="inputTaskSearch"
        />
      </div>
      <section class="grid">
        <div class="panel" id="divItemNoteListParent">
          <!-- Injection de la liste des taches -->
        </div>

      <!-- =============================
            EDITEUR DE TACHE      
      ============================= -->
      <div class="task-editor-panel">
        <!-- Barre d'actions -->    
        <div class="task-editor-toolbar">
          <!-- Actions gauche -->
          <div class="task-editor-toolbar-actions">
            <button class="task-editor-toolbar-button" id="btnTaskEditorValider">
              <img src="./images/IconeValider.webp" alt="Valider">
            </button>

            <button class="task-editor-toolbar-button" id="btnTaskEditorPrint">
              <img src="./images/IconeImprimer.webp" alt="Imprimer">
            </button>

            <button class="task-editor-toolbar-button task-editor-toolbar-button-danger" id="btnTaskEditorDelete">
              <img src="./images/IconeSupprimer.webp" alt="Supprimer">
            </button>
          </div>

          <!-- Meta droite -->
          <div class="task-editor-toolbar-meta">
            <div class="task-editor-toolbar-meta-item">
              <span class="task-editor-toolbar-meta-label">Priorité</span>
              <select class="task-editor-toolbar-select" id="selectTaskEditorPriority">
                <option value="LOW">Basse</option>
                <option value="MEDIUM">Moyenne</option>
                <option value="HIGH">Haute</option>
              </select>
            </div>

            <div class="task-editor-toolbar-meta-item">
              <span class="task-editor-toolbar-meta-label">Statut</span>
              <select class="task-editor-toolbar-select" id="selectTaskEditorStatus">
                <option value="status1">À faire</option>
                <option value="status2">En cours</option>
                <option value="status3">En attente</option>
              </select>
            </div>
          </div>
        </div>


        <!-- Catégorie -->
        <input
          type="text"
          class="task-editor-category-input"
          placeholder="[ Catégorie ]"
          value="Gestion de projet"
          id="inputTaskEditorCategory"
        />

        <!-- Titre -->
        <input
          type="text"
          class="task-editor-title-input"
          placeholder="Titre de la tâche"
          value="Réunion de lancement du projet marketing Q4"
          id="inputTaskEditorTitle"
        />

        <!-- Description -->
        <div class="task-editor-section">
          <p class="task-editor-section-label">Détail de la tâche</p>
          <textarea class="task-editor-description-input" id="textareaTaskEditorDetail">Organiser la première réunion avec l'équipe marketing pour définir les objectifs, le planning et les responsabilités.</textarea>
        </div>

        <!-- Étapes -->
        <div class="task-editor-section">
          <p class="task-editor-section-label">Étapes</p>

          <!-- Zone scrollable de étapes -->
            <div class="task-editor-steps-scroll" id="divTaskEditorStepParent">

              <div class="task-editor-step-row">
                <button class="task-editor-step-drag">⋮⋮</button>
                <input type="checkbox" class="task-editor-step-checkbox"/>
                <div class="task-editor-step-text" contenteditable="true">
                  Présenter les objectifs et le planning
                </div>
                <button class="task-editor-step-date">04 oct. 2024</button>
                <button class="task-editor-step-alert">
                  <img src="./images/IconeNotifyEnabled.webp" alt="Alerte">
                </button>
                <button class="task-editor-step-delete">
                  <img src="./images/IconeSupprimer.webp" alt="Supprimer">
                </button>
              </div>
              <div class="task-editor-step-row">
                <button class="task-editor-step-drag">⋮⋮</button>
                <input type="checkbox" class="task-editor-step-checkbox"/>
                <div class="task-editor-step-text" contenteditable="true">
                  Présenter les objectifs et le planning 2
                </div>
                <button class="task-editor-step-date">04 oct. 2024</button>
                <button class="task-editor-step-alert">
                  <img src="./images/IconeNotifyDisabled.webp" alt="Alerte">
                </button>
                <button class="task-editor-step-delete">
                  <img src="./images/IconeSupprimer.webp" alt="Supprimer">
                </button>
              </div>


            </div>
            <!-- Bouton à ajouter dynamiquement -->
            <button class="task-editor-add-step-button" id="btnTaskEditorAddStep">
              + Ajouter une étape
            </button>
          </div>

          <!-- Dates bas de carte -->
          <div class="task-editor-dates-box">
            <div class="task-editor-date-item">
              <span class="task-editor-date-label">Début</span>
              <button class="task-editor-date-value" id="btnTaskEditorDateStart">19 sept. 2024</button>
            </div>

            <div class="task-editor-date-item">
              <span class="task-editor-date-label">Fin</span>
              <button class="task-editor-date-value" id="btnTaskEditorDateEnd">04 oct. 2024</button>
            </div>
          </div>
      </div>

        <div class="panel side-deadlines">
          <h3>Échéances du mois</h3>
          <div class="deadline">Bilan T1 — 15 avr.</div>
          <div class="deadline green">Campagne de printemps — 30 avr.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./scripts/globalFunction.js"></script>
  <script src="./scripts/app.js"></script>
  <script src="./scripts/noteSystem.js"></script>

</body>
</html>
